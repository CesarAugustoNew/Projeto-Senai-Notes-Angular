<button
  type="button"
  class="theme-toggle"
  (click)="theme.toggle()"
  [attr.aria-label]="theme.isDark() ? 'Ativar modo claro' : 'Ativar modo escuro'"
  [title]="theme.isDark() ? 'Modo claro' : 'Modo escuro'"
>
  <i class="fa-solid" [class.fa-sun]="theme.isDark()" [class.fa-moon]="!theme.isDark()" aria-hidden="true"></i>
</button>
